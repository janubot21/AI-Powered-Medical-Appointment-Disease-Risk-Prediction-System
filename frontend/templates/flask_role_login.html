<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EXAFLUENCE | Portal Access</title>
  <style>
    :root {
      --bg-left: #e9e5e9;
      --bg-right: #b8d4ea;
      --card: #f4f5f6;
      --ink: #1f2c42;
      --muted: #4c5c78;
      --blue: #2b70b6;
      --blue-dark: #26639f;
      --line: #cfd7e3;
      --red: #dc2a30;
      --shadow: 0 20px 45px rgba(45, 66, 96, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      background: linear-gradient(90deg, var(--bg-left) 0%, var(--bg-right) 100%);
      color: var(--ink);
    }

    .frame {
      width: min(1100px, 100%);
      aspect-ratio: 16 / 9;
      min-height: 560px;
      background: var(--card);
      border-radius: 6px;
      overflow: hidden;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .media {
      position: relative;
      background:
        linear-gradient(180deg, rgba(42, 96, 150, 0.22), rgba(74, 161, 220, 0.36)),
        url("https://images.pexels.com/photos/7089401/pexels-photo-7089401.jpeg?auto=compress&cs=tinysrgb&w=1800") center / cover no-repeat;
      display: flex;
      align-items: flex-end;
      padding: 32px;
    }

    .media::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(190, 226, 246, 0.18), rgba(140, 200, 233, 0.22));
      pointer-events: none;
    }

    .caption {
      position: relative;
      z-index: 1;
      color: #eaf5ff;
      max-width: 360px;
      font-size: clamp(1rem, 1.2vw, 1.12rem);
      line-height: 1.5;
      text-wrap: balance;
    }

    .panel {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: clamp(52px, 8vw, 86px) clamp(34px, 4vw, 56px);
      background: #f3f4f6;
    }

    .content {
      width: min(420px, 100%);
    }

    .logo {
      margin: 0;
      font-size: clamp(2.9rem, 4.2vw, 4rem);
      line-height: 1;
      letter-spacing: 0.02em;
      font-weight: 800;
      text-transform: uppercase;
      font-family: "Montserrat", "Avenir Next", sans-serif;
    }

    .logo .exa {
      color: #1f5fb4;
    }

    .logo .fluence {
      color: var(--red);
    }

    .sub {
      margin: 12px 0 8px;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--muted);
      font-weight: 700;
      font-size: 1rem;
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(2.3rem, 3vw, 3rem);
      line-height: 1.05;
      font-weight: 700;
      color: #1f2a3f;
    }

    .btn {
      display: block;
      width: 100%;
      text-align: center;
      text-decoration: none;
      border-radius: 999px;
      padding: 13px 18px;
      font-weight: 700;
      transition: filter 140ms ease, transform 140ms ease;
      font-size: 1.08rem;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
    }

    .btn + .btn {
      margin-top: 14px;
    }

    .btn-primary {
      color: #fff;
      background: linear-gradient(180deg, #357fc4, var(--blue-dark));
      border: 1px solid #2b6ca8;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.35);
    }

    .btn-secondary {
      color: #2c394f;
      background: #f1f2f4;
      border: 1px solid #c8d1de;
    }

    .btn:hover {
      filter: brightness(1.03);
      transform: translateY(-1px);
    }

    @media (max-width: 980px) {
      body {
        padding: 0;
      }

      .frame {
        min-height: 100vh;
        aspect-ratio: auto;
        border-radius: 0;
        grid-template-columns: 1fr;
      }

      .media {
        min-height: 340px;
      }

      .panel {
        padding-top: 32px;
      }
    }
  </style>
</head>
<body>
  <main class="frame">
    <section class="media">
      <p class="caption">Empowering Healthcare, One Click at a Time: Your Health, Your Records, Your Control.</p>
    </section>

    <section class="panel">
      <div class="content">
        <p class="logo"><span class="exa">EXA</span><span class="fluence">FLUENCE</span></p>
        <p class="sub">PORTAL ACCESS</p>
        <h1>Login</h1>
        <a class="btn btn-primary" href="/patient/login">Patient</a>
        <a class="btn btn-secondary" href="/doctor/login">Doctor</a>
      </div>
    </section>
  </main>
</body>
</html>
