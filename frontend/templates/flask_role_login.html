<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EXAFLUENCE | Portal Access - Login</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap');

    :root {
      --blue-900: #061a5d;
      --blue-700: #0a4d8c;
      --blue-500: #3f85ff;
      --purple-700: #502f96;
      --orange-500: #ff8f3f;
      --white: #f7fbff;
      --line: rgba(170, 216, 255, 0.5);
      --panel: rgba(244, 250, 255, 0.75);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 22px;
      overflow: hidden;
      font-family: "Poppins", "Inter", sans-serif;
      color: #13345e;
      background:
        radial-gradient(circle at 18% 18%, rgba(69, 142, 255, 0.35), transparent 35%),
        radial-gradient(circle at 88% 16%, rgba(255, 155, 86, 0.32), transparent 34%),
        radial-gradient(circle at 82% 85%, rgba(112, 57, 210, 0.24), transparent 45%),
        linear-gradient(135deg, #040f46 0%, #0a3f92 43%, #3c2878 71%, #4d2f80 100%);
      animation: pageFadeIn .7s ease;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .26;
      background-image:
        linear-gradient(rgba(138, 196, 255, 0.09) 1px, transparent 1px),
        linear-gradient(90deg, rgba(138, 196, 255, 0.09) 1px, transparent 1px);
      background-size: 56px 56px;
    }

    .stage {
      position: relative;
      width: min(1400px, 100%);
      aspect-ratio: 16 / 9;
      min-height: 640px;
      border-radius: 28px;
      border: 1px solid rgba(153, 215, 255, 0.45);
      overflow: hidden;
      box-shadow:
        0 38px 86px rgba(0, 17, 58, 0.55),
        0 0 0 1px rgba(147, 210, 255, 0.34),
        0 0 54px rgba(106, 188, 255, 0.32);
      display: grid;
      grid-template-columns: 1.06fr .94fr;
      isolation: isolate;
      backdrop-filter: blur(6px);
    }

    .ambient {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(circle at 70% 12%, rgba(255, 166, 98, 0.42), transparent 26%),
        radial-gradient(circle at 38% 56%, rgba(67, 170, 255, 0.28), transparent 34%);
    }

    .ambient .ecg-wide {
      position: absolute;
      left: -10%;
      right: -10%;
      top: 52%;
      height: 130px;
      filter: drop-shadow(0 0 11px rgba(124, 224, 255, 0.85));
      animation: driftX 6.8s linear infinite;
      opacity: .92;
    }

    .ambient .ecg-wide svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .ambient .hud-grid {
      position: absolute;
      left: 58%;
      right: 4%;
      top: 8%;
      bottom: 10%;
      border: 1px solid rgba(150, 210, 255, 0.18);
      border-radius: 18px;
      box-shadow: inset 0 0 30px rgba(98, 177, 255, 0.1);
    }

    .ambient .hud-grid::before,
    .ambient .hud-grid::after {
      content: "";
      position: absolute;
      inset: 10px;
      border: 1px solid rgba(150, 210, 255, 0.12);
      border-radius: 14px;
    }

    .ambient .dna {
      position: absolute;
      right: 4%;
      bottom: 8%;
      width: 180px;
      height: 74px;
      opacity: .65;
      filter: drop-shadow(0 0 8px rgba(255, 155, 92, 0.45));
      animation: floatY 4s ease-in-out infinite;
    }

    .ambient .plus {
      position: absolute;
      width: 44px;
      height: 44px;
      clip-path: polygon(35% 0,65% 0,65% 35%,100% 35%,100% 65%,65% 65%,65% 100%,35% 100%,35% 65%,0 65%,0 35%,35% 35%);
      background: linear-gradient(170deg, rgba(232, 246, 255, 0.84), rgba(143, 215, 255, 0.32));
      box-shadow: 0 0 20px rgba(116, 199, 255, 0.5);
      animation: pulse 3.8s ease-in-out infinite;
    }

    .ambient .p1 { left: 31%; top: 26%; }
    .ambient .p2 { right: 8%; top: 30%; animation-delay: 1.2s; }
    .ambient .p3 { right: 18%; bottom: 24%; animation-delay: 2s; }

    .ambient .heart-wrap {
      position: absolute;
      right: 10%;
      bottom: 11%;
      width: 190px;
      height: 160px;
      display: grid;
      place-items: center;
      opacity: .93;
    }

    .ambient .ring {
      position: absolute;
      width: 130px;
      height: 130px;
      border: 2px solid rgba(255, 175, 114, 0.48);
      border-radius: 50%;
      animation: ringPulse 2.5s ease-out infinite;
    }

    .ambient .ring.r2 { animation-delay: 1.2s; }

    .ambient .heart {
      width: 108px;
      height: 108px;
      filter: drop-shadow(0 0 18px rgba(255, 151, 90, 0.8));
      animation: heartBeat 2.05s ease-in-out infinite;
    }

    .left {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: flex-end;
      padding: 34px 34px 30px;
      background:
        linear-gradient(180deg, rgba(13, 85, 153, 0.16), rgba(8, 58, 117, 0.6)),
        url("https://images.pexels.com/photos/7089401/pexels-photo-7089401.jpeg?auto=compress&cs=tinysrgb&w=1800") center/cover no-repeat;
      border-right: 1px solid rgba(165, 218, 255, 0.5);
      overflow: hidden;
    }

    .left::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 24%, rgba(173, 222, 255, 0.26), transparent 34%),
        linear-gradient(180deg, rgba(138, 220, 255, 0.1), rgba(6, 43, 96, 0.32));
      pointer-events: none;
    }

    .left::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(140deg, rgba(240, 250, 255, 0.18), rgba(122, 188, 240, 0.06));
      backdrop-filter: blur(1px);
      pointer-events: none;
    }

    .left .overlay-ecg {
      position: absolute;
      left: 0;
      right: 0;
      top: 58%;
      height: 72px;
      filter: drop-shadow(0 0 8px rgba(169, 232, 255, 0.84));
      opacity: .88;
      animation: driftX 5.4s linear infinite;
    }

    .left .overlay-ecg svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .tagline {
      position: relative;
      z-index: 3;
      margin: 0;
      max-width: 420px;
      color: #eef9ff;
      font-size: clamp(1rem, 1.2vw, 1.16rem);
      line-height: 1.5;
      text-shadow: 0 4px 18px rgba(0, 37, 77, 0.5);
    }

    .right {
      position: relative;
      z-index: 2;
      display: grid;
      place-items: center;
      padding: 36px;
      background:
        linear-gradient(155deg, rgba(240, 249, 255, 0.09), rgba(255, 183, 127, 0.08) 46%, rgba(130, 84, 224, 0.12));
    }

    .panel {
      width: min(470px, 100%);
      border-radius: 28px;
      border: 1px solid rgba(172, 224, 255, 0.7);
      padding: clamp(28px, 4vw, 42px);
      background: var(--panel);
      backdrop-filter: blur(12px);
      box-shadow:
        0 24px 62px rgba(8, 50, 98, 0.26),
        inset 0 1px 0 rgba(255, 255, 255, 0.86),
        0 0 34px rgba(126, 203, 255, 0.35);
      position: relative;
      overflow: hidden;
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: 28px;
      padding: 1px;
      background: linear-gradient(140deg, rgba(120, 196, 255, 0.78), rgba(255, 170, 109, 0.5), rgba(127, 197, 255, 0.62));
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      opacity: .75;
    }

    .brand {
      margin: 0;
      font-size: clamp(2.2rem, 3.9vw, 3.2rem);
      line-height: 1;
      font-weight: 800;
      letter-spacing: .02em;
      text-transform: uppercase;
    }

    .brand .exa { color: #1f5fbd; }
    .brand .fluence { color: #d72635; }

    .subtitle {
      margin: 12px 0 22px;
      color: #4f6280;
      font-size: clamp(1rem, 1.4vw, 1.26rem);
      font-weight: 600;
      letter-spacing: .02em;
      border-top: 1px solid rgba(112, 153, 195, 0.36);
      padding-top: 12px;
    }

    .btn {
      width: 100%;
      display: block;
      border-radius: 999px;
      text-align: center;
      text-decoration: none;
      font-size: 1.15rem;
      font-weight: 700;
      padding: 15px 18px;
      transition: transform .18s ease, filter .18s ease, box-shadow .18s ease;
    }

    .btn + .btn { margin-top: 12px; }

    .btn.primary {
      color: #fff;
      border: 1px solid rgba(29, 99, 180, 0.95);
      background: linear-gradient(135deg, #2f7ff0 0%, #0a4d8c 72%, #0a4a86 100%);
      box-shadow:
        0 14px 28px rgba(19, 86, 159, 0.33),
        inset 0 1px 0 rgba(255, 255, 255, 0.26),
        0 0 20px rgba(73, 153, 255, 0.38);
    }

    .btn.secondary {
      color: #304764;
      border: 1px solid rgba(133, 174, 214, 0.95);
      background: rgba(252, 255, 255, 0.82);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.92);
    }

    .btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.04);
    }

    .btn:focus-visible {
      outline: 3px solid rgba(86, 165, 255, 0.42);
      outline-offset: 2px;
    }

    .particles {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(188, 233, 255, 0.95);
      box-shadow: 0 0 12px rgba(188, 233, 255, 0.9);
      animation: driftParticle linear infinite;
    }

    @keyframes pageFadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes driftX {
      0% { transform: translateX(-1.1%); }
      50% { transform: translateX(1.1%); }
      100% { transform: translateX(-1.1%); }
    }

    @keyframes floatY {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    @keyframes pulse {
      0%,100% { transform: scale(.95); opacity: .55; }
      50% { transform: scale(1.07); opacity: .9; }
    }

    @keyframes heartBeat {
      0%,100% { transform: scale(.95); }
      18% { transform: scale(1.03); }
      32% { transform: scale(.98); }
      46% { transform: scale(1.08); }
      62% { transform: scale(1); }
    }

    @keyframes ringPulse {
      0% { transform: scale(.72); opacity: .58; }
      85% { transform: scale(1.36); opacity: 0; }
      100% { opacity: 0; }
    }

    @keyframes driftParticle {
      0% { transform: translateY(0) translateX(0); opacity: 0; }
      15% { opacity: .95; }
      100% { transform: translateY(-180px) translateX(40px); opacity: 0; }
    }

    @media (max-width: 1020px) {
      body { padding: 10px; }

      .stage {
        min-height: 100vh;
        aspect-ratio: auto;
        grid-template-columns: 1fr;
        border-radius: 14px;
      }

      .left { min-height: 320px; }
      .right { padding: 20px 14px 30px; }
      .ambient .dna,
      .ambient .heart-wrap,
      .ambient .p3,
      .ambient .hud-grid { display: none; }
    }
  </style>
</head>
<body>
  <main class="stage">
    <div class="ambient" aria-hidden="true">
      <div class="ecg-wide">
        <svg viewBox="0 0 1600 220" preserveAspectRatio="none">
          <path d="M0 126 L130 126 L163 126 L188 80 L214 172 L242 101 L286 126 L441 126 L468 126 L493 84 L520 168 L545 102 L590 126 L746 126 L772 126 L798 81 L824 171 L850 104 L894 126 L1050 126 L1076 126 L1100 82 L1128 172 L1154 102 L1198 126 L1351 126 L1379 126 L1403 84 L1428 170 L1455 103 L1498 126 L1600 126" fill="none" stroke="rgba(158, 236, 255, .95)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="plus p1"></span>
      <span class="plus p2"></span>
      <span class="plus p3"></span>
      <span class="hud-grid"></span>
      <div class="dna">
        <svg viewBox="0 0 320 120" preserveAspectRatio="none">
          <path d="M5 90 C65 10,125 10,185 90 S305 170,315 30" fill="none" stroke="rgba(255,163,101,.82)" stroke-width="5"/>
          <path d="M5 30 C65 110,125 110,185 30 S305 -50,315 90" fill="none" stroke="rgba(255,132,73,.72)" stroke-width="5"/>
          <path d="M44 52 L80 68 M87 40 L123 54 M130 65 L166 81 M173 44 L208 58 M216 69 L252 84 M259 48 L295 61" stroke="rgba(255,183,138,.8)" stroke-width="3"/>
        </svg>
      </div>
      <div class="heart-wrap">
        <span class="ring"></span>
        <span class="ring r2"></span>
        <svg class="heart" viewBox="0 0 128 128">
          <defs>
            <linearGradient id="heartGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#ffd18f"/>
              <stop offset="52%" stop-color="#ff8b4a"/>
              <stop offset="100%" stop-color="#f25a30"/>
            </linearGradient>
          </defs>
          <path fill="url(#heartGrad)" d="M64 114c-3 0-6-1-8-4C33 88 12 68 12 44c0-15 12-27 27-27c10 0 18 5 25 14c7-9 15-14 25-14c15 0 27 12 27 27c0 24-21 44-44 66c-2 3-5 4-8 4z"/>
          <path d="M21 73 L34 73 L40 56 L48 89 L58 66 L73 66 L83 43 L95 81 L104 62 L118 62" fill="none" stroke="rgba(255, 250, 240, .95)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>

    <section class="left">
      <div class="overlay-ecg" aria-hidden="true">
        <svg viewBox="0 0 1000 120" preserveAspectRatio="none">
          <path d="M0 66 L78 66 L98 30 L118 94 L137 50 L180 66 L336 66 L356 66 L378 28 L398 96 L418 49 L460 66 L620 66 L640 66 L662 30 L682 95 L703 51 L746 66 L1000 66" fill="none" stroke="rgba(196,241,255,.95)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <p class="tagline">Empowering Healthcare, One Click at a Time</p>
    </section>

    <section class="right">
      <article class="panel">
        <h1 class="brand"><span class="exa">EXA</span><span class="fluence">FLUENCE</span></h1>
        <p class="subtitle">Portal Access - Login</p>
        <a class="btn primary" href="/patient/login">Patient Login</a>
        <a class="btn secondary" href="/doctor/login">Doctor Login</a>
      </article>
    </section>

    <div class="particles" id="particles" aria-hidden="true"></div>
  </main>

  <script>
    (function createParticles() {
      const host = document.getElementById("particles");
      if (!host) return;
      const count = 44;
      for (let i = 0; i < count; i += 1) {
        const p = document.createElement("span");
        p.className = "particle";
        const size = (Math.random() * 3.4 + 1.6).toFixed(2);
        const left = (Math.random() * 100).toFixed(2);
        const bottom = (Math.random() * 16).toFixed(2);
        const duration = (Math.random() * 6 + 6).toFixed(2);
        const delay = (Math.random() * -12).toFixed(2);
        p.style.width = size + "px";
        p.style.height = size + "px";
        p.style.left = left + "%";
        p.style.bottom = bottom + "%";
        p.style.animationDuration = duration + "s";
        p.style.animationDelay = delay + "s";
        host.appendChild(p);
      }
    })();
  </script>
</body>
</html>
