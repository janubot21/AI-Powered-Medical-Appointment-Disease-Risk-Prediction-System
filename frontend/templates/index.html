<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Risk Prediction Portal</title>
  <style>
    body {
      font-family: Consolas, monospace;
      margin: 0;
      padding: 28px;
      color: #1b1f2a;
      min-height: 100vh;
      background:
        radial-gradient(circle at 10% 8%, rgba(30, 138, 209, 0.2), transparent 35%),
        radial-gradient(circle at 90% 82%, rgba(26, 178, 145, 0.2), transparent 38%),
        linear-gradient(150deg, #eff6ff, #f6fbff 48%, #eef8ff);
    }
    .wrap { max-width: 860px; margin: 0 auto; }
    .card {
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid #d9dce7;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 16px 36px rgba(20, 49, 92, 0.12);
    }
    a { display: inline-block; margin-right: 12px; margin-top: 8px; text-decoration: none; color: #0b7a75; font-weight: 700; }
                          /* Shared app background theme */
    body {
      background: linear-gradient(160deg, #FFE3E1 0%, #9CD5FF 100%) !important;
      background-color: #FFE3E1 !important;
    }
    .global-page-footer {
      width: min(92vw, 980px);
      margin: 0.25rem auto 0.2rem;
      padding: 0.56rem 0.95rem;
      border-radius: 0.82rem;
      border: 1px solid rgba(170, 188, 214, 0.85);
      background: rgba(233, 238, 246, 0.84);
      color: #607089;
      text-align: center;
      line-height: 1.2;
      font-size: clamp(0.74rem, 0.95vw, 0.84rem);
      font-weight: 600;
      letter-spacing: 0.01em;
      box-shadow: 0 6px 14px rgba(83, 97, 127, 0.08);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }

    .global-page-footer-line {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.45rem;
      white-space: nowrap;
    }

    .global-page-footer .sep {
      opacity: 0.6;
      font-weight: 700;
    }

    @media (max-width: 840px) {
      .global-page-footer {
        width: min(96vw, 980px);
        font-size: 0.76rem;
        padding: 0.52rem 0.72rem;
      }

      .global-page-footer-line {
        white-space: normal;
        line-height: 1.35;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Risk Prediction Portal</h1>
      <p>Use separate pages for patient booking and doctor review.</p>
      <a href="/patient">Open Patient Page</a>
      <a href="/doctor">Open Doctor Page</a>
      <a href="/docs">Open API Docs</a>
    </div>
  </div>
  <footer class="global-page-footer">
    <div class="global-page-footer-line">
      <span>&copy; 2026 AIHealth Hub</span>
      <span class="sep">|</span>
      <span>Powered by AI Healthcare System</span>
      <span class="sep">|</span>
      <span>Contact: support@aihealthhub.com</span>
    </div>
  </footer>
</body>
</html>
