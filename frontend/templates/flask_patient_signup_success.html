<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patient ID Generated</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #162033;
      min-height: 100vh;
      padding: 24px 14px;
      background:
        radial-gradient(circle at 12% 8%, rgba(255, 173, 199, 0.22), transparent 36%),
        radial-gradient(circle at 90% 84%, rgba(94, 147, 245, 0.22), transparent 42%),
        linear-gradient(155deg, #fff1f7, #eef3ff 52%, #ecf7ff);
    }
    .wrap {
      max-width: 620px;
      margin: 20px auto;
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid #d8dfef;
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 20px 42px rgba(25, 49, 88, 0.14);
      backdrop-filter: blur(3px);
    }
    h1 { margin-top: 0; font-size: clamp(1.7rem, 4vw, 2.4rem); }
    .idbox {
      margin-top: 12px;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #bfdbfe;
      background: #eff6ff;
      font-size: 1.05rem;
    }
    a { color: #176b9d; font-weight: 700; text-decoration: none; border-bottom: 1px solid rgba(23, 107, 157, 0.35); }
                          /* Shared app background theme */
    body {
      background: linear-gradient(160deg, #FFE3E1 0%, #9CD5FF 100%) !important;
      background-color: #FFE3E1 !important;
    }
    .global-page-footer {
      width: min(92vw, 980px);
      margin: 0.25rem auto 0.2rem;
      padding: 0.56rem 0.95rem;
      border-radius: 0.82rem;
      border: 1px solid rgba(170, 188, 214, 0.85);
      background: rgba(233, 238, 246, 0.84);
      color: #607089;
      text-align: center;
      line-height: 1.2;
      font-size: clamp(0.74rem, 0.95vw, 0.84rem);
      font-weight: 600;
      letter-spacing: 0.01em;
      box-shadow: 0 6px 14px rgba(83, 97, 127, 0.08);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }

    .global-page-footer-line {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.45rem;
      white-space: nowrap;
    }

    .global-page-footer .sep {
      opacity: 0.6;
      font-weight: 700;
    }

    @media (max-width: 840px) {
      .global-page-footer {
        width: min(96vw, 980px);
        font-size: 0.76rem;
        padding: 0.52rem 0.72rem;
      }

      .global-page-footer-line {
        white-space: normal;
        line-height: 1.35;
      }
    }
  </style>
  <script>
    setTimeout(function () {
      window.location.href = "/patient/login";
    }, 3000);
  </script>
</head>
<body>
  <main class="wrap">
    <h1>Account Created</h1>
    <p>Patient account created for <strong>{{ patient_name }}</strong>.</p>
    <div class="idbox">Generated Patient ID: <strong>{{ patient_id }}</strong></div>
    <p>Redirecting to login page...</p>
    <p>If not redirected, <a href="/patient/login">go to login</a>.</p>
  </main>
  <footer class="global-page-footer">
    <div class="global-page-footer-line">
      <span>&copy; 2026 AIHealth Hub</span>
      <span class="sep">|</span>
      <span>Powered by AI Healthcare System</span>
      <span class="sep">|</span>
      <span>Contact: support@aihealthhub.com</span>
    </div>
  </footer>
</body>
</html>
