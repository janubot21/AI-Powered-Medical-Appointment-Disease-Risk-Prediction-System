<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doctor Access - AIHealth Hub</title>
  <style>
    :root {
      --ink: #172033;
      --paper: #ffffff;
      --line: #d7dfef;
      --ok: #0f766e;
      --warn: #b91c1c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--ink);
      min-height: 100vh;
      background:
        radial-gradient(circle at 12% 10%, rgba(65, 122, 246, 0.24), transparent 38%),
        radial-gradient(circle at 92% 12%, rgba(43, 172, 189, 0.2), transparent 34%),
        linear-gradient(150deg, #eaf3ff, #f4f9ff 45%, #eef7ff);
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .shell {
      width: min(980px, 100%);
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: 0 22px 44px rgba(23, 32, 51, 0.14);
      overflow: hidden;
    }

    .top {
      background: linear-gradient(105deg, #1d4ed8, #0f766e);
      color: #fff;
      padding: 18px 22px;
    }

    .top h1 {
      margin: 0;
      font-size: clamp(1.35rem, 2.6vw, 1.9rem);
    }

    .top p {
      margin: 6px 0 0;
      opacity: 0.95;
    }

    .grid {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
    }

    h2 {
      margin: 0 0 10px;
      font-size: 1.18rem;
    }

    label {
      display: block;
      margin: 10px 0 6px;
      font-weight: 700;
      font-size: 0.95rem;
    }

    input, button {
      width: 100%;
      border-radius: 10px;
      font-family: inherit;
      font-size: 0.95rem;
    }

    input {
      border: 1px solid var(--line);
      padding: 10px 12px;
      background: #fcfdff;
    }

    button {
      margin-top: 12px;
      border: 0;
      color: #fff;
      padding: 10px 12px;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(115deg, #1d4ed8, #2563eb);
    }

    .signup-btn {
      background: linear-gradient(115deg, #0f766e, #0ea5a6);
    }

    .status {
      margin-top: 10px;
      min-height: 24px;
      white-space: pre-wrap;
      font-size: 0.92rem;
    }

    .ok { color: var(--ok); }
    .err { color: var(--warn); }

    .links {
      padding: 0 20px 20px;
    }

    .links a {
      text-decoration: none;
      color: #1d4ed8;
      font-weight: 700;
      margin-right: 14px;
    }

    @media (max-width: 880px) {
      .grid { grid-template-columns: 1fr; }
    }
                          /* Shared app background theme */
    body {
      background: linear-gradient(160deg, #FFE3E1 0%, #9CD5FF 100%) !important;
      background-color: #FFE3E1 !important;
    }

    .login-footer {
      margin: 0 20px 20px;
      text-align: center;
      padding: 10px 14px 12px;
      font-size: 0.82rem;
      line-height: 1.45;
      color: #4f6076;
      background: rgba(243, 247, 251, 0.92);
      border: 1px solid rgba(145, 174, 204, 0.45);
      border-radius: 10px;
    }
  
    .global-page-footer {
      width: min(92vw, 980px);
      margin: 0.25rem auto 0.2rem;
      padding: 0.56rem 0.95rem;
      border-radius: 0.82rem;
      border: 1px solid rgba(170, 188, 214, 0.85);
      background: rgba(233, 238, 246, 0.84);
      color: #607089;
      text-align: center;
      line-height: 1.2;
      font-size: clamp(0.74rem, 0.95vw, 0.84rem);
      font-weight: 600;
      letter-spacing: 0.01em;
      box-shadow: 0 6px 14px rgba(83, 97, 127, 0.08);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }

    .global-page-footer-line {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.45rem;
      white-space: nowrap;
    }

    .global-page-footer .sep {
      opacity: 0.6;
      font-weight: 700;
    }

    @media (max-width: 840px) {
      .global-page-footer {
        width: min(96vw, 980px);
        font-size: 0.76rem;
        padding: 0.52rem 0.72rem;
      }

      .global-page-footer-line {
        white-space: normal;
        line-height: 1.35;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="top">
      <h1><span style="color:#2f6fdb;">AI</span><span style="color:#d94343;">Health</span> <span style="color:#111111;">Hub</span> - Doctor Access</h1>
      <p>Login as old doctor or signup as new doctor.</p>
    </header>

    <section class="grid">
      <article class="card">
        <h2>Login (Old Doctor)</h2>
        <label for="loginDoctorId">Doctor ID</label>
        <input id="loginDoctorId" placeholder="Example: janu@2002" />
        <label for="loginPassword">Password</label>
        <input id="loginPassword" type="password" placeholder="Enter Password" />
        <button id="loginBtn" type="button">Login</button>
        <div id="loginStatus" class="status"></div>
      </article>

      <article class="card">
        <h2>Signup (New Doctor)</h2>
        <label for="signupDoctorId">New Doctor ID</label>
        <input id="signupDoctorId" placeholder="Example: janu@2002" />
        <label for="signupPassword">Password</label>
        <input id="signupPassword" type="password" placeholder="Create Password" />
        <button id="signupBtn" class="signup-btn" type="button">Signup</button>
        <div id="signupStatus" class="status"></div>
      </article>
    </section>

    <div class="links">
      <a href="/login">Back to Main Login</a>
      <a href="/patient-auth">Patient Auth</a>
    </div>
</main>

  <script>
    function setCookie(name, value, days) {
      const ttlDays = Number.isFinite(days) ? days : 7;
      const expiresAt = new Date(Date.now() + ttlDays * 24 * 60 * 60 * 1000).toUTCString();
      document.cookie = `${name}=${encodeURIComponent(value)}; expires=${expiresAt}; path=/; SameSite=Lax`;
    }

    function getCookie(name) {
      const needle = `${name}=`;
      const entries = document.cookie.split(";");
      for (const entry of entries) {
        const item = entry.trim();
        if (item.startsWith(needle)) {
          return decodeURIComponent(item.slice(needle.length));
        }
      }
      return "";
    }

    async function postJson(url, payload) {
      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (!res.ok) {
        const detail = data && data.detail ? data.detail : "Request failed";
        throw new Error(typeof detail === "string" ? detail : JSON.stringify(detail));
      }
      return data;
    }

    function setStatus(targetId, message, isError) {
      const el = document.getElementById(targetId);
      el.textContent = message;
      el.className = isError ? "status err" : "status ok";
    }

    function goToDoctorPage() {
      window.location.href = "/doctor";
    }

    const rememberedDoctorId = getCookie("doctor_id");
    if (rememberedDoctorId) {
      document.getElementById("loginDoctorId").value = rememberedDoctorId;
    }

    document.getElementById("loginBtn").addEventListener("click", async () => {
      try {
        const doctor_id = document.getElementById("loginDoctorId").value.trim();
        const password = document.getElementById("loginPassword").value.trim();
        const data = await postJson("/doctor-login", { doctor_id, password });
        setStatus("loginStatus", data.message, false);
        setCookie("doctor_id", doctor_id, 14);
        setCookie("user_role", "doctor", 14);
        goToDoctorPage();
      } catch (err) {
        setStatus("loginStatus", err.message, true);
      }
    });

    document.getElementById("signupBtn").addEventListener("click", async () => {
      try {
        const doctor_id = document.getElementById("signupDoctorId").value.trim();
        const password = document.getElementById("signupPassword").value.trim();
        const data = await postJson("/doctor-signup", { doctor_id, password });
        setStatus("signupStatus", data.message, false);
        setCookie("doctor_id", doctor_id, 14);
        setCookie("user_role", "doctor", 14);
        goToDoctorPage();
      } catch (err) {
        setStatus("signupStatus", err.message, true);
      }
    });
  </script>
  <footer class="global-page-footer">
    <div class="global-page-footer-line">
      <span>&copy; 2026 AIHealth Hub</span>
      <span class="sep">|</span>
      <span>Powered by AI Healthcare System</span>
      <span class="sep">|</span>
      <span>Contact: support@aihealthhub.com</span>
    </div>
  </footer>
</body>
</html>
