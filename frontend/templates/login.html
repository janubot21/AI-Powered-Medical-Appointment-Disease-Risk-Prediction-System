<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIHealth Hub Role Login</title>
  <style>
    :root {
      --ink: #172033;
      --soft: #eef4ff;
      --line: #d6deef;
      --paper: #ffffff;
      --primary: #0f766e;
      --secondary: #1d4ed8;
      --accent: #f59e0b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 8% 10%, rgba(20, 164, 146, 0.22), transparent 36%),
        radial-gradient(circle at 90% 15%, rgba(67, 109, 239, 0.2), transparent 32%),
        radial-gradient(circle at 76% 85%, rgba(245, 158, 11, 0.15), transparent 32%),
        linear-gradient(155deg, #eaf6ff, #f8fbff 48%, #f3f9ff);
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .shell {
      width: min(1040px, 100%);
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: 0 24px 54px rgba(23, 32, 51, 0.12);
      overflow: hidden;
      backdrop-filter: blur(4px);
    }

    .topbar {
      padding: 20px 24px;
      background: linear-gradient(105deg, #0f766e, #1d4ed8);
      color: #fff;
    }

    .topbar h1 {
      margin: 0;
      font-size: clamp(1.45rem, 2.8vw, 2rem);
      letter-spacing: 0.02em;
    }

    .topbar p {
      margin: 6px 0 0;
      opacity: 0.95;
    }

    .roles {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      padding: 22px;
    }

    .role-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--paper);
      overflow: hidden;
    }

    .cover {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
    }

    .role-content {
      padding: 12px;
    }

    .role-btn {
      display: inline-block;
      width: 100%;
      text-align: center;
      text-decoration: none;
      font-weight: 700;
      color: #fff;
      padding: 24px 14px;
      border-radius: 14px;
      font-size: 1.15rem;
      letter-spacing: 0.01em;
      transition: transform 150ms ease, filter 150ms ease;
    }

    .role-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    .patient-btn {
      background: linear-gradient(110deg, #0f766e, #0ea5a6);
    }

    .doctor-btn {
      background: linear-gradient(110deg, #1d4ed8, #2563eb);
    }

    .quick {
      padding: 0 22px 20px;
      font-size: 0.95rem;
    }

    .quick a {
      color: #0f766e;
      font-weight: 700;
      text-decoration: none;
      margin-right: 14px;
    }

    @media (max-width: 860px) {
      .roles { grid-template-columns: 1fr; }
      .cover { height: 200px; }
    }
                          /* Shared app background theme */
    body {
      background: linear-gradient(160deg, #FFE3E1 0%, #9CD5FF 100%) !important;
      background-color: #FFE3E1 !important;
    }
    .global-page-footer {
      width: min(92vw, 980px);
      margin: 0.25rem auto 0.2rem;
      padding: 0.56rem 0.95rem;
      border-radius: 0.82rem;
      border: 1px solid rgba(170, 188, 214, 0.85);
      background: rgba(233, 238, 246, 0.84);
      color: #607089;
      text-align: center;
      line-height: 1.2;
      font-size: clamp(0.74rem, 0.95vw, 0.84rem);
      font-weight: 600;
      letter-spacing: 0.01em;
      box-shadow: 0 6px 14px rgba(83, 97, 127, 0.08);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }

    .global-page-footer-line {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.45rem;
      white-space: nowrap;
    }

    .global-page-footer .sep {
      opacity: 0.6;
      font-weight: 700;
    }

    @media (max-width: 840px) {
      .global-page-footer {
        width: min(96vw, 980px);
        font-size: 0.76rem;
        padding: 0.52rem 0.72rem;
      }

      .global-page-footer-line {
        white-space: normal;
        line-height: 1.35;
      }
    }
  </style>
  <link rel="stylesheet" href="{{ url_for('static', filename='page-animations.css') }}">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <h1><span style="color:#2f6fdb;">AI</span><span style="color:#d94343;">Health</span> <span style="color:#111111;">Hub</span></h1>
      <p>Select login type.</p>
    </header>

    <section class="roles">
      <article class="role-card">
        <img
          class="cover"
          src="https://images.pexels.com/photos/7659564/pexels-photo-7659564.jpeg?auto=compress&cs=tinysrgb&w=1200"
          alt="Patient support"
        />
        <div class="role-content">
          <a class="role-btn patient-btn" href="/patient-auth">Patient</a>
        </div>
      </article>

      <article class="role-card">
        <img
          class="cover"
          src="https://images.pexels.com/photos/7088530/pexels-photo-7088530.jpeg?auto=compress&cs=tinysrgb&w=1200"
          alt="Doctor reviewing records"
        />
        <div class="role-content">
          <a class="role-btn doctor-btn" href="/doctor-auth">Doctor</a>
        </div>
      </article>
    </section>

    <div class="quick">
      <a href="/home">Old Home</a>
      <a href="/docs" target="_blank" rel="noreferrer">API Docs</a>
      <a href="/health" target="_blank" rel="noreferrer">Health Check</a>
    </div>
  </main>
  <footer class="global-page-footer">
    <div class="global-page-footer-line">
      <span>&copy; 2026 AIHealth Hub</span>
      <span class="sep">|</span>
      <span>Powered by AI Healthcare System</span>
      <span class="sep">|</span>
      <span>Contact: support@aihealthhub.com</span>
    </div>
  </footer>
  <script src="{{ url_for('static', filename='page-animations.js') }}"></script>
</body>
</html>
